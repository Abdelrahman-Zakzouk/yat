<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يتلو | Yatlo Quran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Rakkas&display=swap"
    rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <style>
    .quran-font {
      font-family: 'Amiri Quran', serif;
      line-height: 2.5;
    }

    #shareCanvas {
      display: none;
    }

    /* MODAL ANIMATION */
    #shareModal {
      transition: opacity 0.3s ease, visibility 0.3s ease;
      visibility: hidden;
      opacity: 0;
    }

    #shareModal.active {
      visibility: visible;
      opacity: 1;
    }

    #shareModal>div {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: scale(0.9);
    }

    #shareModal.active>div {
      transform: scale(1);
    }

    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 0;
      border-radius: 1rem;
      font-weight: 700;
      color: white;
      transition: all 0.2s;
    }

    .share-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body class="min-h-screen bg-[#0f1a19] text-slate-200 font-medium">
  <header
    class="px-8 py-4 flex justify-between items-center border-b border-teal-900/50 bg-[#162927]/80 backdrop-blur-md sticky top-0 z-50">
    <a class="text-4xl font-['Rakkas'] text-teal-400 hover:text-teal-300 transition-colors" href="index.html">يتلو</a>
    <nav class="hidden md:flex gap-8 text-sm uppercase tracking-wider text-slate-400">
      <a href="#" class="hover:text-teal-400 transition">الرئيسية</a>
      <a href="#" class="hover:text-teal-400 transition">الفهرس</a>
    </nav>
    <button class="text-teal-400 text-3xl md:hidden"><ion-icon name="menu-outline"></ion-icon></button>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-12 lg:py-24">

    <div class="flex justify-center mb-12">
      <div class="bg-[#162927] p-1 rounded-full border border-teal-800/50 flex items-center relative w-64 h-12">
        <div id="toggleBg"
          class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-teal-600 rounded-full transition-all duration-300 shadow-lg">
        </div>
        <button onclick="setMode('daily')" class="relative z-10 flex-1 text-sm font-bold transition-colors duration-300"
          id="btn-daily">آية اليوم</button>
        <button onclick="setMode('random')"
          class="relative z-10 flex-1 text-sm font-bold text-slate-500 transition-colors duration-300"
          id="btn-random">آية عشوائية</button>
      </div>
    </div>

    <div
      class="flex flex-wrap items-center justify-center gap-3 mb-10 bg-[#162927]/50 p-4 rounded-2xl border border-teal-800/30 relative">
      <div class="relative flex items-center gap-2">
        <label class="text-teal-400 text-sm">السورة:</label>
        <div class="relative">
          <input type="text" id="surahSearch" oninput="filterSurahs()" placeholder="ابحث باسم السورة..."
            class="w-48 bg-[#0f1a19] border border-teal-800 rounded-lg px-3 py-1 text-white focus:border-teal-400 outline-none transition-all">
          <div id="surahList"
            class="hidden absolute top-full left-0 w-full bg-[#1a2e2c] border border-teal-800 rounded-b-lg mt-1 max-h-60 overflow-y-auto z-[100] shadow-2xl custom-scrollbar">
          </div>
        </div>
        <input type="hidden" id="surahInput">
      </div>
      <div class="flex items-center gap-2">
        <label class="text-teal-400 text-sm">الآية:</label>
        <input type="number" id="ayahInput" min="1" placeholder="1"
          class="w-16 bg-[#0f1a19] border border-teal-800 rounded-lg px-2 py-1 text-center text-white focus:border-teal-400 outline-none">
      </div>
      <button onclick="searchVerse()"
        class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-1.5 rounded-lg transition-all flex items-center gap-2 active:scale-95 shadow-lg">
        <ion-icon name="search-outline"></ion-icon><span>انتقال</span>
      </button>
    </div>

    <section class="relative group">
      <div
        class="absolute -inset-1 bg-gradient-to-r from-teal-600 to-emerald-600 rounded-3xl blur opacity-25 group-hover:opacity-40 transition duration-1000">
      </div>
      <div
        class="relative bg-[#1a2e2c] border border-teal-800/50 rounded-3xl p-8 md:p-16 flex flex-col items-center shadow-2xl">
        <p id="verse" class="quran-font text-3xl md:text-4xl text-center mb-10 text-white"></p>

        <div id="audioBtn" style="display:none;" class="flex flex-wrap items-center justify-center gap-4 mb-8">
          <button onclick="toggleAudio()"
            class="flex items-center gap-2 bg-emerald-700 hover:bg-emerald-600 text-white px-8 py-3 rounded-full transition-all shadow-lg">
            <ion-icon name="play-outline" id="playIcon"></ion-icon><span id="audioStatus">استماع</span>
          </button>
          <select id="reciterSelect" onchange="loadRecitation()"
            class="bg-[#162927] text-teal-400 border border-teal-800 rounded-lg px-4 py-2 outline-none focus:border-teal-500 transition-all">
            <option value="Yasser_Ad-Dussary_128kbps">ياسر الدوسري</option>
            <option value="Alafasy_128kbps">مشاري العفاسي</option>
            <option value="Abdul_Basit_Murattal_192kbps">عبد الباسط</option>
            <option value="MaherAlMuaiqly128kbps">ماهر المعيقلي</option>
          </select>
        </div>

        <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-teal-800 to-transparent mb-8"></div>

        <div class="flex flex-wrap justify-center gap-4 mb-8">
          <div onclick="goToSurah()"
            class="flex items-center gap-3 cursor-pointer hover:bg-teal-800/30 p-3 rounded-xl transition-all border border-transparent hover:border-teal-700">
            <ion-icon name="book-outline" class="text-teal-400 text-2xl"></ion-icon>
            <span id="chapter" class="text-lg font-['Amiri']"></span>
          </div>
          <button onclick="toggleTafsir()"
            class="flex items-center gap-2 bg-teal-900/30 border border-teal-800 text-teal-400 px-5 py-2 rounded-xl hover:bg-teal-800/50 transition">
            <ion-icon name="information-circle-outline"></ion-icon><span>التفسير</span>
          </button>
          <button onclick="generateNewVerse()"
            class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-3 rounded-full transition-all shadow-lg active:scale-95">
            <ion-icon name="reload-outline"></ion-icon><span>آية أخرى</span>
          </button>
          <button onclick="shareAsImage()"
            class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-full transition-all shadow-lg active:scale-95">
            <ion-icon name="share-social-outline"></ion-icon><span>مشاركة</span>
          </button>
        </div>

        <div id="tafsirPanel" class="hidden w-full mt-4 p-6 bg-[#0f1a19] border border-teal-800 rounded-2xl">
          <h4 class="text-teal-400 font-bold mb-4 flex items-center gap-2">التفسير الميسر</h4>
          <p id="tafsirContent" class="text-slate-300 leading-relaxed font-['Amiri'] text-lg"></p>
        </div>
      </div>
    </section>
  </main>

  <div id="shareModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4 backdrop-blur-sm">
    <div class="bg-[#1a2e2c] border border-teal-800 w-full max-w-lg rounded-3xl p-6 shadow-2xl">
      <img id="previewImage" class="w-full rounded-xl mb-6 shadow-lg border border-teal-700/30">
      <div class="flex flex-col gap-3">
        <button onclick="shareTo('whatsapp')" class="share-btn bg-[#25D366]">
          <ion-icon name="logo-whatsapp"></ion-icon><span>واتساب</span>
        </button>
        <button onclick="shareTo('native')"
          class="share-btn bg-gradient-to-r from-[#833ab4] via-[#fd1d1d] to-[#fcb045]">
          <ion-icon name="logo-instagram"></ion-icon><span>إنستجرام / ستوري</span>
        </button>
        <button onclick="copyToClipboard()" class="share-btn bg-[#1877F2]">
          <ion-icon name="copy-outline"></ion-icon><span>نسخ للفيسبوك</span>
        </button>
        <button onclick="closeModal()"
          class="mt-2 py-2 text-slate-400 hover:text-white transition-colors">إغلاق</button>
      </div>
    </div>
  </div>

  <div id="toast"
    class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-teal-600 text-white px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 pointer-events-none z-[200] flex items-center gap-2">
    <ion-icon name="checkmark-circle"></ion-icon><span id="toastMessage"></span>
  </div>

  <canvas id="shareCanvas"></canvas>
  <script src="build/script.js"></script>
</body>

</html>
