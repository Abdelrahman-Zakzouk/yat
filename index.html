<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يتلو | Yatlo Quran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Rakkas&display=swap"
    rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <link rel="stylesheet" href="/build/css/style.css">
</head>

<body class="min-h-screen bg-[#0f1a19] text-slate-200 font-medium">
  <header
    class="px-8 py-4 flex justify-between items-center border-b border-teal-900/50 bg-[#162927]/80 backdrop-blur-md sticky top-0 z-50">
    <a class="text-4xl font-['Rakkas'] text-teal-400 hover:text-teal-300 transition-colors" href="/index.html">يتلو</a>
    <div id="resumeWidget" class="hidden mb-6">
      <div
        class="bg-gradient-to-r from-[#1a2e2c] to-[#0f1a19] border border-teal-800/50 rounded-2xl p-5 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-4">
          <div class="bg-teal-500/20 p-3 rounded-full text-teal-400">
            <ion-icon name="book" class="text-2xl"></ion-icon>
          </div>
          <div>
            <h4 class="text-sm text-teal-500 font-bold">تابع ختمتك الحالية</h4>
            <p class="text-white text-lg font-['Amiri']" id="resumeStatusText">جاري التحميل...</p>
          </div>
        </div>
        <a href="/build/html/khatma.html?action=resume"
          class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
          <span>استمر</span>
          <ion-icon name="arrow-back-outline"></ion-icon>
        </a>
      </div>
    </div>
    <nav class="hidden md:flex gap-8 text-sm uppercase tracking-wider text-slate-400">
      <div class="hidden md:flex items-center gap-6">
        <a href="/build/html/history.html" class="text-gray-400 hover:text-white transition-colors text-sm">السجل</a>
      </div>
      <nav class="hidden md:flex gap-8 text-sm uppercase tracking-wider text-slate-400">
        <button onclick="openIndex()" class="hover:text-teal-400 transition">القائمة</button>
      </nav>
    </nav>
    <button onclick="openIndex()" class="text-teal-400 text-3xl md:hidden">
      <ion-icon name="menu-outline"></ion-icon>
    </button>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6 lg:py-6">
    <div class="flex justify-center mb-6">
      <div class="bg-[#162927] p-1 rounded-full border border-teal-800/50 flex items-center relative w-64 h-12">
        <div id="toggleBg"
          class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-teal-600 rounded-full transition-all duration-300 shadow-lg">
        </div>
        <button onclick="setMode('daily')" class="relative z-10 flex-1 text-sm font-bold transition-colors duration-300"
          id="btn-daily">آية اليوم</button>
        <button onclick="setMode('random')"
          class="relative z-10 flex-1 text-sm font-bold text-slate-500 transition-colors duration-300"
          id="btn-random">آية عشوائية</button>
      </div>
    </div>

    <div
      class="flex flex-wrap items-center justify-center gap-3 mb-10 bg-[#162927]/50 p-4 rounded-2xl border border-teal-800/30 relative">
      <div class="relative flex items-center gap-2">
        <label class="text-teal-400 text-sm">السورة:</label>
        <div class="relative">
          <input type="text" id="surahSearch" oninput="filterSurahs()" onkeydown="handleSurahKey(event)"
            onchange="handleAutofill(event)" autocomplete="on" placeholder="ابحث باسم السورة..."
            class="w-48 bg-[#0f1a19] border border-teal-800 rounded-lg px-3 py-1 text-white focus:border-teal-400 outline-none transition-all">
          <div id="surahList"
            class="hidden absolute top-full left-0 w-full bg-[#1a2e2c] border border-teal-800 rounded-b-lg mt-1 max-h-60 overflow-y-auto z-[100] shadow-2xl custom-scrollbar">
          </div>
        </div>
        <input type="hidden" id="surahInput">
      </div>
      <div class="flex items-center gap-2">
        <label class="text-teal-400 text-sm">الآية:</label>
        <input type="number" id="ayahInput" onkeydown="handleAyahKey(event)" min="1" placeholder="1"
          class="w-16 bg-[#0f1a19] border border-teal-800 rounded-lg px-2 py-1 text-center text-white focus:border-teal-400 outline-none">
      </div>
      <button type="button" onclick="searchVerse()"
        class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-1.5 rounded-lg transition-all flex items-center gap-2 active:scale-95 shadow-lg">
        <ion-icon name="search-outline"></ion-icon><span>انتقال</span>
      </button>
    </div>

    <section class="relative group">
      <div
        class="absolute -inset-1 bg-gradient-to-r from-teal-600 to-emerald-600 rounded-3xl blur opacity-25 group-hover:opacity-40 transition duration-1000">
      </div>
      <div
        class="relative bg-[#1a2e2c] border border-teal-800/50 rounded-3xl p-8 md:p-16 flex flex-col items-center shadow-2xl">

        <h2 id="chapter" class="text-teal-500 font-['Amiri'] text-xl mb-4">...</h2>

        <p id="verse" class="quran-font text-3xl md:text-5xl text-center mb-10 text-white leading-relaxed"></p>



        <div class="mt-8 flex flex-wrap justify-center gap-3">
          <div class="flex gap-2">
            <button onclick="toggleTafsir()"
              class="flex items-center gap-2 bg-teal-900/40 hover:bg-teal-800 text-teal-300 px-5 py-2.5 rounded-2xl border border-teal-800/50 transition-all active:scale-95">
              <ion-icon name="book-outline"></ion-icon>
              <span class="text-sm font-bold">التفسير</span>
            </button>
            <button onclick="goToSurah()"
              class="flex items-center gap-2 bg-teal-900/40 hover:bg-teal-800 text-teal-300 px-5 py-2.5 rounded-2xl border border-teal-800/50 transition-all active:scale-95">
              <ion-icon name="open-outline"></ion-icon>
              <span class="text-sm font-bold">السورة كاملة</span>
            </button>
          </div>

          <div class="flex gap-2">
            <div class="flex bg-teal-600 rounded-2xl shadow-lg">
              <button id="audioBtn" onclick="toggleAudio()"
                class="flex items-center gap-2 hover:bg-teal-500 text-white px-5 py-2.5 rounded-r-2xl border-l border-teal-700 transition-all active:scale-95">
                <ion-icon id="playIcon" name="play-outline"></ion-icon>
                <span id="audioStatus" class="text-sm font-bold">استماع</span>
              </button>
              <select id="reciterSelect" onchange="loadRecitation()"
                class="bg-teal-600 text-white text-xs px-2 rounded-l-2xl outline-none border-none cursor-pointer">

                <option value="Yasser_Ad-Dussary_128kbps">ياسر الدوسري</option>
                <option value="Abdul_Basit_Mujawwad_128kbps">عبد الباسط (مجود)</option>
                <option value="Husary_128kbps">الحصري</option>
                <option value="Alafasy_128kbps">مشاري العفاسي</option>
                <option value="Abdurrahmaan_As-Sudais_192kbps">عبد الرحمن السديس</option>
                <option value="Nasser_Alqatami_128kbps">ناصر القطامي</option>
                <option value="Fares_Abbad_64kbps">فارس عباد</option>
                <option value="Saood_ash-Shuraym_128kbps">سعود الشريم</option>
                <option value="Abu_Bakr_Ash-Shaatree_128kbps">أبو بكر الشاطري</option>
              </select>
            </div>

            <button onclick="shareAsImage()"
              class="flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-2xl backdrop-blur-sm border border-white/10 transition-all active:scale-95">
              <ion-icon name="share-social-outline"></ion-icon>
              <span class="text-sm font-bold">مشاركة</span>
            </button>
          </div>
        </div>

        <div id="tafsirPanel" class="hidden w-full mt-10 p-6 bg-[#0f1a19] border border-teal-800 rounded-2xl">
          <h4 class="text-teal-400 font-bold mb-4 flex items-center gap-2">التفسير الميسر</h4>
          <p id="tafsirContent" class="text-slate-300 leading-relaxed font-['Amiri'] text-lg"></p>
        </div>
      </div>
      <div id="notePanel" class="hidden mt-6 p-4 bg-teal-900/20 border border-teal-500/30 rounded-2xl">
        <p id="noteContent" class="text-slate-300 text-sm leading-relaxed"></p>
      </div>
    </section>
  </main>

  <div id="shareModal"
    class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity duration-300">
    <div
      class="bg-[#12211f] w-full max-w-md rounded-3xl overflow-hidden border border-teal-500/20 shadow-2xl transform scale-95 transition-transform duration-300"
      id="shareModalContent">
      <div class="p-2">
        <img id="previewImage" class="w-full rounded-2xl shadow-lg border border-white/5" alt="Verse Preview">
      </div>

      <div class="p-6 grid grid-cols-3 gap-4">
        <button onclick="copyImageToClipboard()" class="flex flex-col items-center gap-2 group">
          <div
            class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-teal-500/20 transition-all">
            <ion-icon name="copy-outline" class="text-xl text-teal-400"></ion-icon>
          </div>
          <span class="text-[10px] text-gray-400 uppercase tracking-widest">Copy</span>
        </button>

        <button onclick="shareTo('whatsapp')" class="flex flex-col items-center gap-2 group">
          <div
            class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-green-500/20 transition-all">
            <ion-icon name="logo-whatsapp" class="text-xl text-green-400"></ion-icon>
          </div>
          <span class="text-[10px] text-gray-400 uppercase tracking-widest">WhatsApp</span>
        </button>

        <button onclick="shareTo('facebook')" class="flex flex-col items-center gap-2 group">
          <div
            class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-blue-500/20 transition-all">
            <ion-icon name="logo-facebook" class="text-xl text-blue-400"></ion-icon>
          </div>
          <span class="text-[10px] text-gray-400 uppercase tracking-widest">Facebook</span>
        </button>
      </div>

      <button onclick="closeModal()"
        class="w-full py-4 bg-white/5 text-gray-400 text-sm font-bold hover:bg-red-500/10 hover:text-red-400 transition-all border-t border-white/5">
        إغلاق
      </button>
    </div>
  </div>

  <div id="toast"
    class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-teal-600 text-white px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 pointer-events-none z-[200] flex items-center gap-2">
    <ion-icon name="checkmark-circle"></ion-icon><span id="toastMessage"></span>
  </div>

  <div id="indexModal"
    class="fixed inset-0 z-[150] hidden items-center justify-center bg-black/95 p-4 backdrop-blur-md">
    <div
      class="bg-[#1a2e2c] border border-teal-800 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col overflow-hidden shadow-2xl">

      <div class="p-6 border-b border-teal-800/50 flex justify-between items-center bg-[#162927]">
        <h2 class="text-2xl font-['Rakkas'] text-teal-400">القائمة</h2>
        <button onclick="closeIndex()" class="text-slate-400 hover:text-white text-3xl">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="p-2 grid grid-cols-3 gap-1.5 bg-[#162927]/30 border-b border-teal-800/30">

        <button onclick="closeIndex(); window.scrollTo({top: 0, behavior: 'smooth'});"
          class="flex flex-col items-center justify-center py-2 bg-teal-900/40 rounded-lg border border-teal-700/30 hover:bg-teal-400/10 transition-all active:scale-95">
          <ion-icon name="home-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الرئيسية</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Home</span>
          </div>
        </button>

        <button onclick="location.href='/build/html/khatma.html'"
          class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
          <ion-icon name="flag-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">القرآن الكريم</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Quran</span>
          </div>
        </button>

        <button onclick="location.href='/build/html/hadiths.html'"
          class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
          <ion-icon name="book-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأحاديث</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Hadiths</span>
          </div>
        </button>

        <button onclick="location.href='/build/html/duas.html'"
          class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
          <ion-icon name="heart-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأدعية</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Duas</span>
          </div>
        </button>

        <button onclick="location.href='/build/html/history.html'"
          class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
          <ion-icon name="time-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">السجل</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">History</span>
          </div>
        </button>

        <button onclick="location.href='/build/html/profile.html'"
          class="flex flex-col items-center justify-center py-2 bg-teal-500/10 rounded-lg border border-teal-500/20 hover:bg-teal-500/20 transition-all active:scale-95">
          <ion-icon name="person-circle-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
          <div class="text-center leading-tight">
            <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الحساب الشخصي</span>
            <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Profile</span>
          </div>
        </button>

      </div>

      <div class="p-4 bg-[#162927]/50">
        <h3 class="text-teal-500 text-xs mb-2 px-1 font-bold uppercase tracking-widest">فهرس السور</h3>
        <input type="text" id="indexSearch" oninput="renderIndex()" placeholder="ابحث عن سورة..."
          class="w-full bg-[#0f1a19] border border-teal-800 rounded-xl px-4 py-3 text-white focus:border-teal-400 outline-none">
      </div>

      <div id="indexGrid"
        class="flex-1 overflow-y-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 custom-scrollbar">
      </div>
    </div>
  </div>

  <canvas id="shareCanvas"></canvas>
  <script src="/build/js/api-filter.js"></script>
  <script src="/build/js/script.js"></script>
</body>

</html>
