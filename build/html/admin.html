<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <link rel="manifest" href="/manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يتلو | لوحة التحكم</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Rakkas&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --teal-primary: #14b8a6;
            --dark-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Amiri', serif;
        }

        .admin-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .admin-input-premium {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(20, 184, 166, 0.2);
            border-radius: 12px;
            padding: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .admin-input-premium:focus {
            border-color: var(--teal-primary);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.1);
        }

        .admin-push-btn {
            width: 100%;
            background: var(--teal-primary);
            color: white;
            font-weight: bold;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .admin-push-btn:hover {
            background: #0d9488;
            transform: translateY(-2px);
        }

        .admin-push-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--teal-primary);
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen">

    <nav class="fixed top-0 left-0 right-0 bg-[#162927]/90 backdrop-blur-md border-b border-teal-900/50 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a class="text-4xl font-['Rakkas'] text-teal-400 hover:text-teal-300 transition-colors"
                href="/index.html">يتلو</a>

            <div class="flex items-center gap-4">
                <button onclick="location.href='/index.html'"
                    class="hidden md:block text-slate-400 hover:text-teal-400 transition text-sm uppercase tracking-widest">الموقع
                    الرئيسي</button>
                <button onclick="openIndex()" class="text-teal-400 text-3xl flex items-center">
                    <ion-icon name="menu-outline"></ion-icon>
                </button>
            </div>
        </div>
    </nav>

    <div id="loginOverlay"
        class="fixed inset-0 z-[200] bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-teal-500 mb-6"></div>
        <h2 class="text-2xl font-bold text-teal-400 animate-pulse">جاري التحقق من صلاحيات المسؤول...</h2>
        <p class="text-slate-500 mt-2">يرجى الانتظار لحظات</p>
    </div>

    <main id="adminContent" class="hidden max-w-2xl w-full mx-auto pt-32 pb-12 px-4">

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="admin-glass p-6 text-center">
                <div class="flex items-center justify-center gap-2 text-teal-400 mb-1">
                    <ion-icon name="people-outline" class="text-xl"></ion-icon>
                    <span class="text-[10px] uppercase tracking-widest font-bold">نشط الآن</span>
                </div>
                <div id="activeUsersCount" class="text-3xl font-bold text-white">1</div>
            </div>
            <div class="admin-glass p-6 text-center">
                <div class="flex items-center justify-center gap-2 text-teal-400 mb-1">
                    <ion-icon name="eye-outline" class="text-xl"></ion-icon>
                    <span class="text-[10px] uppercase tracking-widest font-bold">إجمالي الزيارات</span>
                </div>
                <div id="totalVisitsCount" class="text-3xl font-bold text-white">...</div>
            </div>
        </div>

        <div class="flex bg-white/5 backdrop-blur-md rounded-2xl p-1 mb-8 border border-white/5">
            <button id="quranTabBtn" onclick="switchAdminMode('quran')"
                class="flex-1 py-3 rounded-xl bg-teal-600 text-white font-bold transition-all">آية اليوم</button>
            <button id="hadithTabBtn" onclick="switchAdminMode('hadith')"
                class="flex-1 py-3 rounded-xl text-slate-400 font-bold transition-all">حديث اليوم</button>
            <button id="rolesTabBtn" onclick="switchAdminMode('roles')"
                class="flex-1 py-3 rounded-xl text-slate-400 font-bold transition-all">المشرفين</button>
        </div>

        <div class="admin-glass p-8 md:p-10 shadow-2xl">
            <header class="text-center mb-8">
                <h1 id="adminTitle" class="text-2xl font-bold text-white">بث آية اليوم</h1>
                <div id="liveIndicator"
                    class="flex items-center justify-center gap-2 mt-3 bg-teal-500/5 py-2 px-4 rounded-full border border-teal-500/10 inline-flex mx-auto">
                    <span class="text-xs uppercase tracking-widest text-teal-500 font-bold">مباشر الآن:</span>
                    <span id="liveDisplay" class="text-white font-bold text-sm">-:-</span>
                </div>
            </header>

            <div class="space-y-6">
                <div id="quranInputArea" class="relative">
                    <label class="text-teal-400 text-xs font-bold block mb-2 px-1 uppercase opacity-70">اختر السورة
                        والآية</label>
                    <input type="text" id="newVerseKey" oninput="unifiedAdminLogic()" placeholder="مثال: الكهف أو 18:10"
                        class="admin-input-premium" autocomplete="off">
                    <div id="adminSearchList"
                        class="hidden absolute z-[100] w-full mt-2 bg-[#0f1a19] border border-teal-500/30 rounded-xl max-h-60 overflow-y-auto shadow-2xl custom-scrollbar">
                    </div>
                </div>

                <div id="hadithInputArea" class="hidden space-y-4">
                    <label class="text-teal-400 text-xs font-bold block mb-2 px-1 uppercase opacity-70">تفاصيل الحديث
                        الشريف</label>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="hadithBookSelect" class="admin-input-premium text-sm">
                            <option value="ara-bukhari">صحيح البخاري</option>
                            <option value="ara-muslim">صحيح مسلم</option>
                            <option value="ara-abudawud">سنن أبي داود</option>
                        </select>
                        <input type="number" id="hadithNumberInput" oninput="unifiedAdminLogic()"
                            placeholder="رقم الحديث" class="admin-input-premium text-sm">
                    </div>
                </div>

                <div id="rolesInputArea" class="hidden space-y-6">
                    <div class="space-y-3">
                        <input type="text" id="adminSearchInput" placeholder="البريد الإلكتروني للمسؤول الجديد"
                            class="admin-input-premium text-center">
                        <button onclick="assignAdminRole()"
                            class="w-full py-4 rounded-xl bg-teal-600 hover:bg-teal-500 text-white font-bold transition-all flex items-center justify-center gap-2">
                            <span>تعيين كمسؤول</span>
                            <ion-icon name="person-add-outline"></ion-icon>
                        </button>
                    </div>
                    <div class="border-t border-white/5 pt-6">
                        <label
                            class="text-teal-400 text-[10px] block mb-4 uppercase tracking-[0.2em] font-black opacity-50">قائمة
                            المسؤولين</label>
                        <div id="adminList" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>

                <div id="previewCard"
                    class="hidden mt-8 p-6 rounded-2xl border border-teal-500/20 bg-teal-500/5 animate-in fade-in duration-500">
                    <div class="flex justify-between items-center mb-4">
                        <span id="previewName" class="text-teal-400 text-sm font-bold"></span>
                        <span
                            class="text-[9px] bg-teal-500/20 px-2 py-1 rounded text-teal-300 uppercase tracking-tighter">مراجعة
                            المحتوى</span>
                    </div>
                    <p id="previewText"
                        class="text-white text-xl text-center leading-relaxed mb-6 font-['Amiri_Quran']"></p>

                    <div class="space-y-2">
                        <label class="text-teal-400 text-xs font-bold block px-1">الهدايات والتأملات:</label>
                        <textarea id="contentNote" class="admin-input-premium text-right h-32 resize-none text-sm"
                            placeholder="اكتب الدروس المستفادة هنا..."></textarea>
                    </div>

                    <button onclick="handlePrimaryAction()" id="updateBtn" class="admin-push-btn mt-6">
                        <span id="btnText">تأكيد وبث التحديث</span>
                        <ion-icon name="paper-plane-outline"></ion-icon>
                    </button>
                </div>

                <div id="statusMsg" class="h-4 text-center text-xs mt-4 transition-all duration-300"></div>
            </div>
        </div>
    </main>

    <div id="indexModal"
        class="fixed inset-0 z-[150] hidden items-center justify-center bg-black/95 p-4 backdrop-blur-md">
        <div
            class="bg-[#1a2e2c] border border-teal-800 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col overflow-hidden shadow-2xl">

            <div class="p-6 border-b border-teal-800/50 flex justify-between items-center bg-[#162927]">
                <h2 class="text-2xl font-['Rakkas'] text-teal-400">القائمة</h2>
                <button onclick="closeIndex()" class="text-slate-400 hover:text-white text-3xl">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>

            <div class="p-2 grid grid-cols-3 gap-1.5 bg-[#162927]/30 border-b border-teal-800/30">

                <button onclick="location.href='/index.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/40 rounded-lg border border-teal-700/30 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="home-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الرئيسية</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Home</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/khatma.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="flag-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">القرآن الكريم</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Quran</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/hadiths.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="book-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأحاديث</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Hadiths</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/duas.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="heart-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأدعية</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Duas</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/history.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="time-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">السجل</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">History</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/profile.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-500/10 rounded-lg border border-teal-500/20 hover:bg-teal-500/20 transition-all active:scale-95">
                    <ion-icon name="person-circle-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الحساب الشخصي</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Profile</span>
                    </div>
                </button>

            </div>

            <div class="p-4 bg-[#162927]/50">
                <h3 class="text-teal-500 text-xs mb-2 px-1 font-bold uppercase tracking-widest">فهرس السور</h3>
                <input type="text" id="indexSearch" oninput="renderIndex()" placeholder="ابحث عن سورة..."
                    class="w-full bg-[#0f1a19] border border-teal-800 rounded-xl px-4 py-3 text-white focus:border-teal-400 outline-none">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/build/js/global.js"></script>
    <script src="/build/js/admin.js"></script>

</body>

</html>
