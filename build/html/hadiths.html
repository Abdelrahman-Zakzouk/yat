<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>يتلو | الأحاديث الشريفة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Rakkas&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/build/css/hadiths.css">
</head>

<body class="min-h-screen flex flex-col bg-[#0b1413]">

    <header
        class="px-8 py-4 flex justify-between items-center border-b border-teal-900/50 bg-[#162927]/80 backdrop-blur-md sticky top-0 z-50">
        <a class="text-4xl font-['Rakkas'] text-teal-400 hover:text-teal-300 transition-colors"
            href="/index.html">يتلو</a>
        <button onclick="openIndex()" class="text-teal-400 text-3xl">
            <ion-icon name="menu-outline"></ion-icon>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 flex-grow w-full">
        <div class="flex justify-center mb-6">
            <div class="bg-[#162927] p-1 rounded-full border border-teal-800/50 flex items-center relative w-64 h-12">
                <div id="toggleBg"
                    class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-teal-600 rounded-full transition-all duration-300 shadow-lg">
                </div>
                <button onclick="setMode('daily')"
                    class="relative z-10 flex-1 text-sm font-bold transition-colors duration-300 text-white"
                    id="btn-daily">حديث
                    اليوم</button>
                <button onclick="setMode('random')"
                    class="relative z-10 flex-1 text-sm font-bold text-slate-500 transition-colors duration-300"
                    id="btn-random">حديث عشوائي</button>
            </div>
        </div>

        <div id="randomControls"
            class="hidden flex flex-wrap items-center justify-center gap-4 mb-10 bg-[#162927]/50 p-4 rounded-3xl border border-teal-800/30">
            <select id="bookSelect" onchange="fetchRandomHadith()"
                class="bg-[#0f1a19] border border-teal-800 rounded-xl px-4 py-2 text-white outline-none text-sm">
                <option value="ara-bukhari">صحيح البخاري</option>
                <option value="ara-muslim">صحيح مسلم</option>
            </select>
            <button onclick="fetchRandomHadith()"
                class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-2 rounded-xl transition-all active:scale-95 font-bold flex items-center gap-2 shadow-lg shadow-teal-900/20">
                <ion-icon name="refresh-outline"></ion-icon> حديث جديد
            </button>
        </div>

        <section class="relative group">
            <div
                class="absolute -inset-1 bg-gradient-to-r from-teal-600 to-emerald-600 rounded-[2.5rem] blur opacity-25 group-hover:opacity-40 transition duration-1000">
            </div>
            <div
                class="relative bg-[#1a2e2c] border border-teal-800/50 rounded-[2.5rem] p-8 md:p-16 flex flex-col items-center shadow-2xl">

                <div class="w-full flex justify-between items-center mb-8">
                    <span id="badgeText"
                        class="bg-teal-500/10 text-teal-400 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest border border-teal-500/20">حديث
                        شريف</span>
                    <span id="hadithMeta" class="text-teal-500/60 text-sm italic font-['Amiri']">جاري التحميل...</span>
                </div>

                <div class="hadith-display-area w-full">
                    <p id="hadithText"
                        class="text-2xl md:text-4xl text-white quran-font leading-[3rem!important] transition-opacity duration-300">
                        ...
                    </p>
                </div>

                <div class="mt-10 flex flex-wrap justify-center gap-4 w-full border-t border-teal-800/20 pt-8">
                    <button onclick="shareHadithText()"
                        class="flex items-center gap-2 bg-teal-900/40 hover:bg-teal-800 text-teal-300 px-6 py-3 rounded-2xl border border-teal-800/50 transition-all active:scale-95">
                        <ion-icon name="copy-outline"></ion-icon>
                        <span class="text-sm font-bold">نسخ النص</span>
                    </button>

                    <button onclick="shareAsImage()"
                        class="flex items-center gap-2 bg-teal-600 hover:bg-teal-500 text-white px-6 py-3 rounded-2xl transition-all active:scale-95 shadow-lg shadow-teal-900/40">
                        <ion-icon name="image-outline"></ion-icon>
                        <span class="text-sm font-bold">مشاركة كصورة</span>
                    </button>
                </div>
            </div>

            <div id="hadithNotePanel" class="hidden mt-6 p-4 bg-teal-900/20 border border-teal-500/30 rounded-2xl">
                <p id="hadithNoteContent" class="text-slate-300 text-sm leading-relaxed"></p>
            </div>
        </section>
    </main>

    <div id="shareModal"
        class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-[#12211f] w-full max-w-md rounded-3xl overflow-hidden border border-teal-500/20 shadow-2xl transform scale-95 transition-transform duration-300"
            id="shareModalContent">
            <div class="p-2">
                <img id="previewImage" class="w-full rounded-2xl shadow-lg border border-white/5" alt="Hadith Preview">
            </div>

            <div class="p-6 grid grid-cols-2 gap-4">
                <button onclick="copyImageToClipboard()"
                    class="flex flex-col items-center gap-2 group bg-white/5 p-4 rounded-2xl hover:bg-teal-500/10 transition-all">
                    <ion-icon name="copy-outline" class="text-2xl text-teal-400"></ion-icon>
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest">نسخ الصورة</span>
                </button>

                <button onclick="triggerNativeShare()"
                    class="flex flex-col items-center gap-2 group bg-teal-600 p-4 rounded-2xl hover:bg-teal-500 transition-all">
                    <ion-icon name="share-social-outline" class="text-2xl text-white"></ion-icon>
                    <span class="text-[10px] text-white uppercase tracking-widest">إرسال للجوال</span>
                </button>
            </div>

            <button onclick="closeModal()"
                class="w-full py-4 bg-white/5 text-gray-400 text-sm font-bold hover:bg-red-500/10 hover:text-red-400 transition-all border-t border-white/5">
                إغلاق
            </button>
        </div>
    </div>

    <div id="indexModal"
        class="fixed inset-0 z-[150] hidden items-center justify-center bg-black/95 p-4 backdrop-blur-md">
        <div
            class="bg-[#1a2e2c] border border-teal-800 w-full max-w-4xl h-[90vh] rounded-3xl flex flex-col overflow-hidden shadow-2xl">

            <div class="p-6 border-b border-teal-800/50 flex justify-between items-center bg-[#162927]">
                <h2 class="text-2xl font-['Rakkas'] text-teal-400">القائمة</h2>
                <button onclick="closeIndex()" class="text-slate-400 hover:text-white text-3xl">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>

            <div class="p-2 grid grid-cols-3 gap-1.5 bg-[#162927]/30 border-b border-teal-800/30">

                <button onclick="closeIndex(); window.scrollTo({top: 0, behavior: 'smooth'});"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/40 rounded-lg border border-teal-700/30 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="home-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الرئيسية</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Home</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/history.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="time-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">سجل الآيات</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">History</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/wird.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-500/10 rounded-lg border border-teal-500/20 hover:bg-teal-500/20 transition-all active:scale-95">
                    <ion-icon name="calendar-clear-outline" class="text-teal-400 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الورد اليومي</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Wird</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/khatma.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="flag-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">رحلة الختمة</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Khatma</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/hadiths.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="book-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأحاديث</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Hadiths</span>
                    </div>
                </button>

                <button onclick="location.href='/build/html/duas.html'"
                    class="flex flex-col items-center justify-center py-2 bg-teal-900/20 rounded-lg border border-teal-700/20 hover:bg-teal-400/10 transition-all active:scale-95">
                    <ion-icon name="heart-outline" class="text-teal-500 text-base mb-0.5"></ion-icon>
                    <div class="text-center leading-tight">
                        <span class="block font-bold text-[17px] text-white pt-0 pb-3 quran-font">الأدعية</span>
                        <span class="block text-[12px] text-teal-600/50 uppercase tracking-widest">Duas</span>
                    </div>
                </button>

            </div>

            <div class="p-4 bg-[#162927]/50">
                <h3 class="text-teal-500 text-xs mb-2 px-1 font-bold uppercase tracking-widest">فهرس السور</h3>
                <input type="text" id="indexSearch" oninput="renderIndex()" placeholder="ابحث عن سورة..."
                    class="w-full bg-[#0f1a19] border border-teal-800 rounded-xl px-4 py-3 text-white focus:border-teal-400 outline-none">
            </div>

            <div id="indexGrid"
                class="flex-1 overflow-y-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 custom-scrollbar">
            </div>
        </div>
    </div>

    <canvas id="shareCanvas" class="hidden"></canvas>

    <div id="toast"
        class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-teal-600 text-white px-6 py-3 rounded-full shadow-2xl transition-all opacity-0 pointer-events-none z-[200] flex items-center gap-2">
        <ion-icon name="checkmark-circle"></ion-icon><span id="toastMessage"></span>
    </div>

    <script src="/build/js/hadiths.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>

</html>
