<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <link rel="manifest" href="/manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | بيان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/build/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="flex items-center justify-center p-6 bg-[#0b1413]">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/index.html" class="inline-block mb-4 text-teal-400 hover:text-teal-300 transition-colors">
                <i class="fas fa-arrow-right ml-2"></i> العودة للرئيسية
            </a>
            <h1 class="text-3xl font-bold text-white">مرحباً بك في بيان</h1>
            <p id="authSubtitle" class="text-slate-400 mt-2">قم بتسجيل الدخول لمتابعة حفظ أحاديثك</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl bg-white/5 border border-white/10">
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-teal-500 uppercase tracking-widest mb-2 px-1">البريد
                        الإلكتروني</label>
                    <input type="email" id="email" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-teal-500 outline-none transition-all"
                        placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-teal-500 uppercase tracking-widest mb-2 px-1">كلمة
                        المرور</label>
                    <input type="password" id="password" required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-teal-500 outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <div class="text-left px-1">
                    <button type="button" onclick="AuthUI.handleForgotPassword()"
                        class="text-xs text-teal-500 hover:text-teal-400 underline transition-all">
                        نسيت كلمة المرور؟
                    </button>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-teal-500 hover:bg-teal-400 text-[#0b1413] font-bold py-4 rounded-2xl transition-all mt-4 flex items-center justify-center gap-2">
                    <span>تسجيل الدخول</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-white/5 pt-6">
                <p id="toggleText" class="text-slate-400 text-sm">ليس لديك حساب؟</p>
                <button id="toggleBtn" class="text-teal-400 font-bold mt-1 hover:underline">إنشاء حساب جديد</button>
            </div>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-[#0b1413] px-4 text-slate-500 font-bold tracking-widest">أو عبر المنصات</span>
                </div>
            </div>

            <button type="button" onclick="AuthUI.signInWithProvider('google')"
                class="flex items-center justify-center gap-3 bg-white/5 border border-white/10 p-4 rounded-2xl hover:bg-white/10 transition-all w-full">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5" alt="Google">
                <span class="text-sm font-bold text-white">جوجل</span>
            </button>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-teal-600 text-white rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-50">
        <span id="toastMessage"></span>
    </div>

    <script src="/build/js/global.js"></script>

    <script src="/build/js/auth.js"></script>

</body>

</html>
