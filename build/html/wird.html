<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورد اليوم | يتلو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Rakkas&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="/build/css/khatma.css">
</head>

<body class="bg-[#0b1211] text-slate-200 h-screen flex flex-col overflow-hidden">

    <div class="w-full bg-teal-900/40 h-1.5 fixed top-0 left-0 z-[200]">
        <div id="wirdProgressBar"
            class="bg-teal-400 h-full shadow-[0_0_10px_#2dd4bf] transition-all duration-500 ease-out" style="width: 0%">
        </div>
    </div>

    <header class="p-4 flex justify-between items-center border-b border-teal-900/30">
        <a class="text-4xl font-['Rakkas'] text-teal-400 hover:text-teal-300 transition-colors"
            href="/index.html">يتلو</a>
        <div class="flex flex-col">
            <span class="text-xs text-teal-500">ورد اليوم</span>
            <span id="wirdStatusText" class="text-sm font-bold text-white">جاري الحساب...</span>
        </div>
        <a href="/index.html" class="text-2xl text-slate-400 hover:text-white"><ion-icon
                name="close-outline"></ion-icon></a>
    </header>

    <main class="flex-1 flex items-center justify-center relative touch-none">

        <button onclick="Reader.changeSpread(1)"
            class="hidden md:flex absolute left-7 z-[100] w-14 h-14 items-center justify-center bg-teal-500/10 hover:bg-teal-500/20 text-teal-400 rounded-full transition-all border border-teal-500/20">
            <ion-icon name="chevron-forward-outline" class="text-3xl"></ion-icon>
        </button>


        <div id="bookContainer" class="relative">
            <div id="pageRight" class="relative">
                <div class="page-image-container">
                    <img id="imgRight" class="quran-img" src="">
                </div>
            </div>
            <div id="pageLeft" class="relative">
                <div class="page-image-container">
                    <img id="imgLeft" class="quran-img" src="">
                </div>
            </div>
        </div>


        <button onclick="Reader.changeSpread(-1)"
            class="hidden md:flex absolute right-7 z-[100] w-14 h-14 items-center justify-center bg-teal-500/10 hover:bg-teal-500/20 text-teal-400 rounded-full transition-all border border-teal-500/20">
            <ion-icon name="chevron-back-outline" class="text-3xl"></ion-icon>
        </button>

    </main>

    <div id="wirdSuccess"
        class="fixed inset-0 bg-teal-950/90 z-[200] hidden flex flex-col items-center justify-center text-center p-6">
        <ion-icon name="checkmark-done-circle" class="text-8xl text-teal-400 mb-4"></ion-icon>
        <h1 class="text-3xl font-bold text-white mb-2">تم بحمد الله!</h1>
        <p class="text-teal-200 mb-8">أنهيت وردك المقرّر لهذا اليوم. تقبل الله منك.</p>
        <!-- <button onclick="window.location.href='/index.html'"
            class="bg-teal-500 px-10 py-3 rounded-full font-bold text-[#0b1211]">العودة للرئيسية</button> -->
    </div>

    <script src="/build/js/api-filter.js"></script>
    <script src="/build/js/khatma.js"></script>
    <script src="/build/js/wird-engine.js"></script>
    <script src="/build/js/global.js"></script>

</body>

</html>
