<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحميل السورة...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/surah.css" />
</head>

<body class="bg-[#f8f9fa]">

    <div class="surah-layout-container">
        <aside class="surah-sidebar">
            <div class="sticky top-10">
                <button
                    class="mb-8 flex items-center gap-2 text-teal-600 font-bold hover:translate-x-1 transition-transform"
                    onclick="goBack()">
                    <span>← العودة للرئيسية</span>
                </button>

                <div class="surah-card-info">
                    <h1 id="surahTitle" class="text-3xl font-bold text-white mb-4">...</h1>
                    <div id="surahDetails" class="text-teal-200 text-sm space-y-2">
                    </div>
                </div>
            </div>
        </aside>

        <main class="surah-main">
            <div id="surahContent" class="verses-list">
            </div>
        </main>
    </div>

    <script>
        // Your existing JS logic remains the same
        const params = new URLSearchParams(window.location.search);
        const surahNumber = params.get("surah");
        if (!surahNumber) { window.location.href = 'index.html'; } else { loadSurah(surahNumber); }

        function loadSurah(number) {
            fetch(`https://api.quran.com/api/v4/verses/by_chapter/${number}?language=ar&fields=text_uthmani&per_page=300`)
                .then(res => res.json())
                .then(data => {
                    let html = data.verses.map(v => `
                        <div class="verse-row">
                            <div class="verse-meta">${v.verse_number}</div>
                            <div class="verse-text-content">${v.text_uthmani}</div>
                        </div>
                    `).join("");
                    document.getElementById("surahContent").innerHTML = html;
                });

            fetch(`https://api.quran.com/api/v4/chapters/${number}`)
                .then(res => res.json())
                .then(data => {
                    const ch = data.chapter;
                    document.getElementById("surahTitle").innerText = "سورة " + ch.name_arabic;
                    document.getElementById("surahDetails").innerHTML = `
                        <p>عدد الآيات: ${ch.verses_count}</p>
                        <p>مكان النزول: ${ch.revelation_place === 'makkah' ? 'مكية' : 'مدنية'}</p>
                    `;
                    document.title = "سورة " + ch.name_arabic;
                });
        }
        function goBack() { window.location.href = 'index.html'; }
        function playFullSurah(number) {
            // Reciter 7 is Alafasy. This returns one long MP3 for the whole surah.
            fetch(`https://api.quran.com/api/v4/chapter_recitations/7/${number}`)
                .then(res => res.json())
                .then(data => {
                    const audioPath = data.audio_file.audio_url;
                    const player = new Audio(audioPath);
                    player.play();
                });
        }
    </script>
</body>

</html>
